<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>东方命理神谕 | Oriental Destiny Oracle</title>

<style>
body{margin:0;background:#0b0f1a;color:#fff;font-family:Arial}
.header{text-align:center;padding:20px;background:#111;font-size:22px}
.cards{display:flex;flex-wrap:wrap;gap:20px;padding:20px}
.card{flex:1;min-width:220px;background:#161c2e;padding:20px;border-radius:10px}
.btn{margin-top:10px;padding:10px;text-align:center;border-radius:6px;cursor:pointer}
.wise{background:#3498db}
.usdt{background:#2ecc71}
.pay{background:#ff3b3b}

.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.85);
display:none;justify-content:center;align-items:center
}

.box{background:#111;padding:20px;border-radius:10px;text-align:center;max-width:300px}

.report{display:none;padding:20px;line-height:1.7}
.download{background:#ffd700;color:#000;padding:10px;margin-top:20px;display:inline-block}
</style>

</head>
<body>

<div class="header">东方命理神谕 | Oriental Destiny Oracle</div>

<div class="cards">

<div class="card">
<h3>流年运势<br>1-Year Fortune</h3>
<p>$9.9</p>
<div class="btn wise" onclick="payWise('9.9','year')">Wise</div>
<div class="btn usdt" onclick="payOther('usdt','year')">USDT</div>
<div class="btn pay" onclick="payOther('alipay','year')">支付宝</div>
<div class="btn pay" onclick="payOther('wechat','year')">微信</div>
</div>

<div class="card">
<h3>十年大运<br>10-Year Cycle</h3>
<p>$39.9</p>
<div class="btn wise" onclick="payWise('39.9','ten')">Wise</div>
<div class="btn usdt" onclick="payOther('usdt','ten')">USDT</div>
<div class="btn pay" onclick="payOther('alipay','ten')">支付宝</div>
<div class="btn pay" onclick="payOther('wechat','ten')">微信</div>
</div>

<div class="card">
<h3>一生命书<br>Lifetime Destiny</h3>
<p>$99.9</p>
<div class="btn wise" onclick="payWise('99.9','life')">Wise</div>
<div class="btn usdt" onclick="payOther('usdt','life')">USDT</div>
<div class="btn pay" onclick="payOther('alipay','life')">支付宝</div>
<div class="btn pay" onclick="payOther('wechat','life')">微信</div>
</div>

<div class="card">
<h3>大师亲批<br>Master Reading</h3>
<p>$199.9</p>
<div class="btn wise" onclick="payWise('199.9','master')">Wise</div>
<div class="btn usdt" onclick="payOther('usdt','master')">USDT</div>
<div class="btn pay" onclick="payOther('alipay','master')">支付宝</div>
<div class="btn pay" onclick="payOther('wechat','master')">微信</div>
</div>

</div>

<!-- 弹窗 -->
<div class="modal" id="modal">
<div class="box" id="modalBox"></div>
</div>

<!-- 报告 -->
<div class="report" id="report"></div>

<script>

const wiseLinks={
"9.9":"https://wise.com/pay/r/Q3B2n3O3HkI_WCI",
"39.9":"https://wise.com/pay/r/A4J8xAQR9_MGaPo",
"99.9":"https://wise.com/pay/r/4_XWh_vXhQGeOy4",
"199.9":"https://wise.com/pay/r/XUil86D4xjzK2ks"
}

const usdt="TE84dFrCx2qmsvA5tsr8kBJBJb5YntrFqX"
const alipay="https://i.imgur.com/Fq46vjy.jpeg"
const wechat="https://i.imgur.com/FyaW9kG.jpeg"

let currentType=""

function payWise(price,type){
currentType=type
localStorage.setItem("unlock",type)
window.open(wiseLinks[price],"_blank")
alert("完成支付后返回点击“解锁报告”\nAfter payment, return and unlock")
showUnlock()
}

function payOther(method,type){
currentType=type
localStorage.setItem("unlock",type)

let html=""

if(method==="usdt"){
html=`<p>USDT Address:<br>${usdt}</p>`
}
if(method==="alipay"){
html=`<img src="${alipay}" width="200">`
}
if(method==="wechat"){
html=`<img src="${wechat}" width="200">`
}

html+=`<br><button onclick="unlock()">解锁报告 / Unlock</button>`

document.getElementById("modalBox").innerHTML=html
document.getElementById("modal").style.display="flex"
}

function showUnlock(){
document.getElementById("modalBox").innerHTML=`
<p>支付完成后点击解锁<br>Unlock after payment</p>
<button onclick="unlock()">解锁报告</button>
`
document.getElementById("modal").style.display="flex"
}

function unlock(){
let t=localStorage.getItem("unlock")
if(!t){alert("请先选择支付方式");return}
document.getElementById("modal").style.display="none"
showReport(t)
}

function showReport(type){

let text=""

if(type==="year"){
text=`《易经》有云：“天行健，君子以自强不息。”此年命局五行呈木火相生之势，象征机遇逐渐显现。事业方面将迎来阶段性突破，但需谨慎决策，避免因冲动而失误。财运整体平稳，可通过副业或技能提升增加收入来源。感情方面宜多沟通，避免误会积累。

Advice: This year favors growth and change. Focus on improving your skills, avoid impulsive decisions, and maintain clear communication in relationships.`
}

if(type==="ten"){
text=`十年大运呈“金火交战”之象，代表挑战与机遇并存。此阶段事业发展关键在于战略选择，适合转型或拓展新领域。财运中期显著提升，但前期需耐心积累。人际关系需防小人，谨慎合作。

Advice: Plan long-term. Avoid risky partnerships and focus on sustainable growth strategies.`
}

if(type==="life"){
text=`命局整体属“中和之格”，人生发展呈渐进上升趋势。早年平稳，中年迎来重要发展期，晚年趋于安定。婚姻宜慎重选择，晚婚更利稳定。子女运良好，有助家族发展。

Advice: Build steadily. Invest in relationships and long-term security rather than short-term gains.`
}

if(type==="master"){
text=`此命格属“藏锋之命”，潜力深厚但不显于表。贵人多在异地，适合外出发展。事业宜选择长期积累型路径。需避免口舌是非，保持低调稳健。

Advice: Stay focused, avoid conflicts, and expand your opportunities beyond your comfort zone.`
}

document.getElementById("report").style.display="block"
document.getElementById("report").innerHTML=`
<h2>命理报告 | Destiny Report</h2>
<p>${text}</p>
<div class="download">下载 / Download</div>
<p style="font-size:12px">仅供娱乐参考，不构成现实建议 | For entertainment only</p>
`
}

</script>

</body>
</html>
